<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit Smash Test Arcade</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://sdk.sub.games/sdk.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="panel intro">
        <p class="eyebrow">Test Arcade</p>
        <h1>Orbit Smash</h1>
        <p class="lede">
          Slide across the lane grid, dodge falling junk, and chase a higher
          score every round.
        </p>
        <div class="controls">
          <button id="classic-button" class="primary">Play Classic</button>
          <button id="bonus-button">Bonus Rush ✨✨</button>
          <button id="skin-button">Founder Skin ✨✨✨</button>
        </div>
        <div class="status-grid">
          <div>
            <span class="label">Tier</span>
            <strong id="tier-label">Checking…</strong>
          </div>
          <div>
            <span class="label">Mode</span>
            <strong id="mode-label">Classic</strong>
          </div>
          <div>
            <span class="label">Best</span>
            <strong id="best-label">0</strong>
          </div>
        </div>
        <p id="message" class="message">
          Move with arrow keys or A/D. Press space to start a fresh run.
        </p>
      </section>

      <section class="panel game-panel">
        <canvas
          id="game"
          width="800"
          height="540"
          aria-label="Orbit Smash game canvas"
        ></canvas>
        <div class="hud">
          <div class="metric">
            <span class="label">Score</span>
            <strong id="score-label">0</strong>
          </div>
          <div class="metric">
            <span class="label">Speed</span>
            <strong id="speed-label">1.0x</strong>
          </div>
          <div class="metric">
            <span class="label">Founder</span>
            <strong id="founder-label">Locked ✨✨✨</strong>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./game.js"></script>
  </body>
</html>
